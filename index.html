<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EvoCore | Primal Lineage</title>
  <style>
    /* Google Fonts for a clean, professional UI */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

    :root {
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-main: #ffffff;
      --text-muted: #d1d5db;
      --accent: #4ade80; /* Organic Green */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      /* Ethereal Organic Background: Deep ocean meeting a lush forest vibe */
      background: linear-gradient(135deg, #0f172a 0%, #115e59 50%, #064e3b 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* Glassmorphism Container */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 1200px;
      text-align: center;
      transition: all 0.5s ease;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    h1 span {
      color: var(--accent);
    }

    p.subtitle {
      color: var(--text-muted);
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    /* Input & Button Styles */
    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      color: white;
      font-size: 1rem;
      outline: none;
      transition: border 0.3s;
    }

    input::placeholder {
      color: #9ca3af;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }

    .btn-primary {
      background: var(--accent);
      color: #064e3b;
    }
    
    .btn-primary:hover {
      background: #22c55e;
      transform: translateY(-2px);
    }

    .btn-google {
      background: white;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .btn-google:hover {
      background: #f3f4f6;
      transform: translateY(-2px);
    }

    /* Auth Section Layout */
    #auth-section {
      max-width: 400px;
      margin: 0 auto;
    }

    /* Hatchery Section Layout (Hidden by default) */
    #hatchery-section {
      display: none;
    }

    .organism-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .organism-card {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .organism-card:hover {
      transform: translateY(-10px);
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(74, 222, 128, 0.2);
    }

    /* Ethereal Orb styling for the organisms */
    .orb {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 15px auto;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .organism-name {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .organism-trait {
      font-size: 0.85rem;
      color: var(--accent);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="glass-panel" id="main-panel">
    
    <div id="auth-section">
      <h1>Evo<span>Core</span></h1>
      <p class="subtitle">Genesis Awaits. Begin your lineage.</p>
      
      <input type="email" id="email" placeholder="Researcher Email">
      <input type="password" id="password" placeholder="Access Code (Password)">
      
      <button class="btn-primary" id="btn-login">Initiate Sequence (Login)</button>
      <button class="btn-google" id="btn-google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
    </div>

    <div id="hatchery-section">
      <h1>The <span>Hatchery</span></h1>
      <p class="subtitle" id="welcome-text">Welcome. Select your Stage-1 Organism to begin the Genesis trial.</p>
      
      <div class="organism-grid" id="organism-grid">
        </div>
    </div>

  </div>

  <script type="module">
    // Import Firebase core and Auth modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    // Your exact Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBahVyXnanI-2aXNj9ajTxqP-MJZXTPG38",
      authDomain: "nexusbio.firebaseapp.com",
      projectId: "nexusbio",
      storageBucket: "nexusbio.firebasestorage.app",
      messagingSenderId: "742997204418",
      appId: "1:742997204418:web:a9d323bc87f164018c8a5b",
      measurementId: "G-85WZJ6JV8T"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // DOM Elements
    const authSection = document.getElementById('auth-section');
    const hatcherySection = document.getElementById('hatchery-section');
    const btnGoogle = document.getElementById('btn-google');
    const btnLogin = document.getElementById('btn-login');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const organismGrid = document.getElementById('organism-grid');
    const welcomeText = document.getElementById('welcome-text');

    // Organism Database (Local array for the UI design phase)
    const starters = [
      { name: "Lumina Spore", trait: "Photosynthesis", color1: "#fef08a", color2: "#ca8a04" },
      { name: "Abyssal Larva", trait: "High-Pressure Adaptation", color1: "#38bdf8", color2: "#0369a1" },
      { name: "Igneous Cell", trait: "Heat Resistance", color1: "#f87171", color2: "#b91c1c" },
      { name: "Verdant Seedling", trait: "Toxin Filtering", color1: "#4ade80", color2: "#15803d" },
      { name: "Aether Wisp", trait: "Evasion (Airflow)", color1: "#c084fc", color2: "#7e22ce" },
      { name: "Geo-Mite", trait: "Hardened Carapace", color1: "#fdba74", color2: "#c2410c" },
      { name: "Venom Slime", trait: "Acidic Touch", color1: "#a3e635", color2: "#4d7c0f" },
      { name: "Volt Anomaly", trait: "Static Discharge", color1: "#fde047", color2: "#ca8a04" }
    ];

    // Function to render the 8 starters into the UI
    function renderHatchery() {
      organismGrid.innerHTML = ''; // Clear grid
      starters.forEach((org, index) => {
        const card = document.createElement('div');
        card.className = 'organism-card';
        card.innerHTML = `
          <div class="orb" style="background: linear-gradient(135deg, ${org.color1}, ${org.color2});"></div>
          <div class="organism-name">${org.name}</div>
          <div class="organism-trait">Passive: ${org.trait}</div>
        `;
        card.onclick = () => {
          alert(`You selected ${org.name}! Next step: Saving to Firestore database...`);
          // Here we will eventually trigger the Firestore save function
        };
        organismGrid.appendChild(card);
      });
    }

    // --- Authentication Logic ---

    // Google Login
    btnGoogle.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (error) {
        console.error("Google Auth Error:", error.message);
        alert("Authentication failed: " + error.message);
      }
    });

    // Email Login (Assuming user creation happens elsewhere, or we can add a register button later)
    btnLogin.addEventListener('click', async () => {
      const email = emailInput.value;
      const password = passwordInput.value;
      if (!email || !password) return alert("Please enter both email and password.");
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        console.error("Email Auth Error:", error.message);
        alert("Login failed: " + error.message);
      }
    });

    // Listen for Auth State Changes (Switches UI instantly)
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is signed in, show Hatchery!
        authSection.classList.add('hidden');
        hatcherySection.style.display = 'block';
        welcomeText.innerText = `Welcome, Researcher ${user.displayName || user.email}. Select your Stage-1 Organism.`;
        renderHatchery();
      } else {
        // User is signed out, show Login!
        authSection.classList.remove('hidden');
        hatcherySection.style.display = 'none';
      }
    });

  </script>
</body>
</html>
